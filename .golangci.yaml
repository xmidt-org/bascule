---
version: "2"

linters:
  settings:
    misspell:
      locale: US
    errorlint:
      # Report non-wrapping error creation using fmt.Errorf
      errorf: false
  enable:
    - dupl
    - errorlint
    - goconst
    - gosec
    - misspell
    - unconvert
    - prealloc
  disable:
    - errcheck
    - ineffassign

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
